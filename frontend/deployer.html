<!DOCTYPE html>
<html>
<head><title>Deployer</title></head>
<body>
<div id="status">Starting...</div>
<div id="result"></div>

<!-- Load Stellar SDK Globally -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/12.2.0/stellar-sdk.min.js"></script>
<script>
const statusEl = document.getElementById('status');
const resultEl = document.getElementById('result');

async function deploy() {
    try {
        const StellarSdk = window.StellarSdk;
        console.log("StellarSdk keys:", Object.keys(StellarSdk));
        statusEl.innerText = "Initializing...";
        
        // Use .rpc in v12+
        const ServerClass = StellarSdk.rpc ? StellarSdk.rpc.Server : StellarSdk.SorobanRpc.Server;
        const rpc = new ServerClass("https://soroban-testnet.stellar.org:443");
        
        const kp = StellarSdk.Keypair.random();
        
        statusEl.innerText = "Funding " + kp.publicKey() + "...";
        await fetch(`https://friendbot.stellar.org/?addr=${kp.publicKey()}`);
        
        statusEl.innerText = "Loading account...";
        let account = await rpc.getAccount(kp.publicKey());
        
        statusEl.innerText = "Fetching WASM...";
        const res = await fetch('/contract.wasm');
        const wasmBuffer = await res.arrayBuffer();
        const wasmUint8 = new Uint8Array(wasmBuffer);
        
        statusEl.innerText = "Uploading WASM...";
        let tx1 = new StellarSdk.TransactionBuilder(account, { fee: "100000", networkPassphrase: StellarSdk.Networks.TESTNET })
            .addOperation(StellarSdk.Operation.uploadContractWasm({ wasm: wasmUint8 }))
            .setTimeout(30)
            .build();
            
        tx1 = await rpc.prepareTransaction(tx1);
        tx1.sign(kp);
        
        let send1 = await rpc.sendTransaction(tx1);
        statusEl.innerText = "Waiting for upload confirmation... Hash: " + send1.hash;
        
        let uploadStatus;
        while(true) {
            uploadStatus = await rpc.getTransaction(send1.hash);
            if(uploadStatus.status !== "NOT_FOUND") break;
            await new Promise(r => setTimeout(r, 2000));
        }
        
        if (uploadStatus.status !== "SUCCESS") {
            throw new Error("Upload Failed " + uploadStatus.status);
        }

        const hashBuffer = await window.crypto.subtle.digest('SHA-256', wasmBuffer);
        const wasmIdUint8 = new Uint8Array(hashBuffer);
        const wasmIdHex = Array.from(wasmIdUint8).map(b => b.toString(16).padStart(2, '0')).join('');
        
        statusEl.innerText = "Instantiating contract...";
        account = await rpc.getAccount(kp.publicKey());
        let tx2 = new StellarSdk.TransactionBuilder(account, { fee: "100000", networkPassphrase: StellarSdk.Networks.TESTNET })
            .addOperation(StellarSdk.Operation.createCustomContract({ address: kp.publicKey(), wasmId: wasmIdHex }))
            .setTimeout(30)
            .build();
            
        tx2 = await rpc.prepareTransaction(tx2);
        tx2.sign(kp);
        
        let send2 = await rpc.sendTransaction(tx2);
        statusEl.innerText = "Waiting for instantiation... Hash: " + send2.hash;
        
        let instStatus;
        while(true) {
            instStatus = await rpc.getTransaction(send2.hash);
            if(instStatus.status !== "NOT_FOUND") break;
            await new Promise(r => setTimeout(r, 2000));
        }
        
        if (instStatus.status === "SUCCESS") {
            const text = JSON.stringify(instStatus);
            const match = text.match(/C[A-Z0-9]{55}/);
            console.log("DEPLOY_SUCCESS:" + match[0]);
            resultEl.innerText = "DEPLOY_SUCCESS:" + match[0];
            statusEl.innerText = "Done!";
        } else {
            resultEl.innerText = "ERROR_INST:" + JSON.stringify(instStatus);
        }

    } catch(e) {
        resultEl.innerText = "ERROR:" + e.message;
        console.error(e);
    }
}
deploy();
</script>
</body>
</html>
