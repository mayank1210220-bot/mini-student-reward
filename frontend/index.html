<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Student Reward App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                <h1>StudentRewards</h1>
            </div>
            <div class="wallet-controls">
                <span id="network-badge" class="badge">Testnet</span>
                <button id="connect-wallet-btn" class="btn primary">Connect Freighter</button>
            </div>
        </header>

        <main>
            <div class="view-toggle">
                <button id="tab-student" class="tab active">Student View</button>
                <button id="tab-teacher" class="tab">Teacher View</button>
            </div>

            <!-- Student Dashboard -->
            <section id="student-view" class="view-section active">
                <div class="card balance-card">
                    <h2>Your Rewards Balance</h2>
                    <div class="balance-display">
                        <span id="student-balance" class="amount">0.00</span>
                        <span class="currency">XLM</span>
                    </div>
                </div>

                <div class="card history-card">
                    <h3>Reward History</h3>
                    <div id="reward-history">
                        <p class="empty-state">Connect wallet to view history...</p>
                    </div>
                </div>
            </section>

            <!-- Teacher Dashboard -->
            <section id="teacher-view" class="view-section hidden">
                <div class="card send-card">
                    <h2>Send Reward</h2>
                    <p class="subtitle">Reward a student for their great work!</p>
                    
                    <form id="reward-form">
                        <div class="input-group">
                            <label for="student-address">Student Stellar Address</label>
                            <input type="text" id="student-address" placeholder="G..." required>
                        </div>
                        
                        <div class="row">
                            <div class="input-group">
                                <label for="reward-amount">Amount (XLM)</label>
                                <input type="number" id="reward-amount" min="0.1" step="0.1" placeholder="10.0" required>
                            </div>
                            <div class="input-group">
                                <label for="reward-memo">Reason (Memo)</label>
                                <input type="text" id="reward-memo" maxlength="28" placeholder="e.g. Math Homework" required>
                            </div>
                        </div>

                        <button type="submit" id="send-reward-btn" class="btn primary full-width">
                            Send Reward
                        </button>
                        <p class="status-msg" id="teacher-status"></p>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <!-- Inline tab switching - works immediately, no dependencies -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var tabStudent = document.getElementById('tab-student');
            var tabTeacher = document.getElementById('tab-teacher');
            var viewStudent = document.getElementById('student-view');
            var viewTeacher = document.getElementById('teacher-view');

            tabStudent.addEventListener('click', function() {
                tabStudent.classList.add('active');
                tabTeacher.classList.remove('active');
                viewStudent.classList.add('active');
                viewTeacher.classList.remove('active');
                viewStudent.classList.remove('hidden');
                viewTeacher.classList.add('hidden');
            });

            tabTeacher.addEventListener('click', function() {
                tabTeacher.classList.add('active');
                tabStudent.classList.remove('active');
                viewTeacher.classList.add('active');
                viewStudent.classList.remove('active');
                viewTeacher.classList.remove('hidden');
                viewStudent.classList.add('hidden');
            });

            console.log('[StudentRewards] Inline tab listeners attached.');
        });
    </script>

    <!-- App logic with Stellar SDK (loaded as module for dynamic imports) -->
    <script type="module" src="app.js"></script>
</body>
</html>
